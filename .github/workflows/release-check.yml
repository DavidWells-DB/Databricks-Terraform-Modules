name: Release tag check

# Runs on every tag push matching the monorepo pattern <module>/vX.Y.Z.
# Enforces two rules from docs/RELEASING.md:
#   1. The pushed tag must have a matching ## [X.Y.Z] entry in the module's CHANGELOG.md.
#   2. The tag must be a new ref (not a force-move of an existing published tag).
#
# On a force-push the "Check tag is not a force-move" step will fail because
# the ref will already exist on origin before the push event fires. GitHub also
# supports denying force-pushes to tag refs at the repo settings level
# (Settings → Branches → Add rule → Restrict deletions + Block force pushes
# for refs/tags/**) — enable that as the primary guard; this workflow is the
# secondary code-level check.

on:
  push:
    tags:
      - '*/v[0-9]*.[0-9]*.[0-9]*'   # matches any <module>/vX.Y.Z

permissions:
  contents: read

jobs:
  release-check:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can inspect tag ancestry

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          # Extract module (everything before the last /vX.Y.Z)
          MODULE="${TAG%/v*}"
          echo "module=${MODULE}" >> "$GITHUB_OUTPUT"

      - name: Check CHANGELOG entry matches tag version
        run: |
          bash scripts/check-release-tag.sh "${{ steps.tag.outputs.tag }}"

      - name: Check tag is not a force-move
        # ls-remote the tag against origin; if it already exists with a
        # *different* commit than the one we just pushed, this is a force-move.
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PUSHED_SHA="${{ github.sha }}"
          EXISTING=$(git ls-remote origin "refs/tags/${TAG}" | awk '{print $1}')
          if [[ -n "$EXISTING" && "$EXISTING" != "$PUSHED_SHA" ]]; then
            echo "ERROR: Tag '${TAG}' already existed at ${EXISTING}." >&2
            echo "       Force-moving published tags is prohibited (docs/RELEASING.md)." >&2
            echo "       Cut a new version instead." >&2
            exit 3
          fi
          echo "OK: Tag '${TAG}' is a new ref (not a force-move)."
