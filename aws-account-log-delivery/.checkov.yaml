# Checkov skip configuration for aws-account-log-delivery.
#
# The following checks are intentionally suppressed for the log delivery S3 bucket:
#
# CKV_AWS_18 — access logging:
#   This IS the log delivery bucket. Enabling access logging on it would require
#   a second S3 bucket as the logging target, creating a circular or nested dependency
#   that is outside this module's scope. Callers who need access logging on this bucket
#   should configure a separate logging bucket and aws_s3_bucket_logging resource in
#   the root composition.
#
# CKV_AWS_21 — versioning:
#   Databricks log delivery is append-only: files are written once and never modified.
#   S3 versioning on an append-only log sink doubles storage costs with no recovery
#   benefit. Retention is managed instead via the lifecycle expiry rule (CKV2_AWS_61).
#
# CKV_AWS_144 — cross-region replication:
#   Cross-region replication for log delivery is an operational resilience choice for
#   the caller, not a module concern. Log files are recoverable from Databricks replay
#   if the bucket is lost, and replication requires a destination bucket ARN that is
#   unknown at module authoring time.
#
# CKV_AWS_145 — KMS (CMK) encryption:
#   SSE-S3 (AES-256) is sufficient for Databricks log delivery. CMK encryption requires
#   KMS key ARN inputs, cross-service key policy IAM wiring, and key rotation configuration
#   that are all caller concerns. Callers who require CMK should configure
#   aws_s3_bucket_server_side_encryption_configuration with their KMS key in the root
#   composition and override the SSE configuration.
#
# CKV_AWS_300 — lifecycle abort incomplete multipart uploads:
#   Databricks log delivery uses single-part PutObject writes, not multipart uploads.
#   The abort_incomplete_multipart_upload rule is not applicable to this workload.
#
# CKV2_AWS_62 — event notifications:
#   S3 event notifications for a log delivery sink are not required by Databricks and
#   are an operational concern for the caller's root composition (e.g., to trigger
#   downstream processing of log files). Not in scope for this module.

skip-check:
  - CKV_AWS_18
  - CKV_AWS_21
  - CKV_AWS_144
  - CKV_AWS_145
  - CKV_AWS_300
  - CKV2_AWS_62
